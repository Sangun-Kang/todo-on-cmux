# todo-on-cmux configuration.
# Copy to ~/.todo-on-cmux/config.yaml (created automatically on first run) and edit.

# How many agent sessions may run at once.
max_concurrent: 2
# Max simultaneously-running tasks per repo (keeps two sessions off the same code).
max_per_repo: 1
# A task that reports `failed` this many times is moved to `blocked`.
max_failures: 2

# Which agent CLI drives each task.
#   claude  - Claude Code (fully tested)
#   codex   - OpenAI Codex CLI (experimental; verify in your environment)
provider: claude

# Provider-specific model id.
#   claude: sonnet | opus | haiku
#   codex:  e.g. gpt-5-codex
# Note: dispatched sessions run unattended and consume tokens — prefer a
# cost-effective model here rather than your most expensive one.
model: sonnet

# How sessions handle permissions.
#   auto    - run with the agent's own auto/full-auto classifier; no prompts,
#             but irreversible/destructive/out-of-environment actions are still
#             blocked by the classifier. Required for unattended operation.
#   prompt  - keep asking for approval on each action (safe, but blocks the
#             session — not unattended).
permission: auto

# Interactive sessions stay open after a task finishes so you can resume them.
# Set true to auto-close a workspace once its task reports `done`.
close_done_workspaces: false

# Task sources. Each adapter is opt-in.
adapters:
  # ~/.todo-on-cmux/todo.md unchecked items ("- [ ] ...").
  local_file: true
  # `gh api notifications` (read-only). Requires an authenticated gh CLI.
  # For GitHub Enterprise, point gh at your host via the GH_HOST env var.
  github: false

# Safety flags. Everything destructive/external is off by default; the keyword
# classifier also routes such tasks to needs_user so they never auto-dispatch.
safety:
  allow_external_send: false
  allow_deploy: false
  allow_delete: false
  allow_pr_create: false
  allow_browser_automation: false
  # When true, a review task may post its findings as a PR comment
  # (never approve / request-changes / create / merge).
  allow_review_comment: false
